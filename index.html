<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Travel Explorer</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        
            <div class="logo">
             <img src="images/logo.png" alt="">
            </div>
            <div class="logo-content">
                <h1> Travel Explorer </h1>
                <p>Your Journey Begins Here</p>
            </div>
      
        <nav>
            <ul>
                <li><a href="#home">Home</a></li>
                <li><a href="#destinations">Destinations</a></li>
                <li><a href="#packages">Packages</a></li>
                <li><a href="#about">About</a></li>
               
            </ul>
        </nav>
         <button class="header-btn">Book Now</button>
        
    </header>
    <main>
        <section id="hero">
            <div class="hero-container">
            <div class="hero-content">
             <span>🌍 Explore the World</span>
             <h2>Discover Your Next Adventure</h2>
             <p> From breathtaking beaches to majestic mountains, explore
                unforgettable destinations and create memories that last a
                lifetime with Travel Explorer.</p>
            </div>
        

            <div class="hero-img">
                <img src="images/hero.png" alt="Travelers enjoying a beautiful tropical destination">
            </div>
             
            </div>
           
            </div>
             <div class="hero-btns">
                <button>Explore Destinations</button>
                <button>Book Now</button>
        </section>
    </main>
</body>
</html>
